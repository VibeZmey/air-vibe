version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: flights
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flights"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  flights:

    build: 
      context: ./backend       
      dockerfile: Flights/Dockerfile
    ports:
      - "8082:8080"
    environment:
      # PostgreSQL
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=flights;Username=postgres;Password=1234"
      # Redis
      ConnectionStrings__Redis: "redis:6379"
      # RabbitMQ
      RabbitMq__HostName: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__ExchangeName: "notifications"
      RabbitMq__Queues__Mail: "mail-service-queue"
      RabbitMq__Queues__Pdf: "pdf-generator-queue"
      RabbitMq__RoutingKeys__EmailRegistration: "email.registration"
      RabbitMq__RoutingKeys__EmailBooking: "email.booking_confirmed"
      RabbitMq__RoutingKeys__PdfGenerate: "pdf.generate_ticket"
      # Encryption
      Encryption__Key: "MGY7McJ5MLGqLu7F2gptcZwP+8nfD9fBC3kG4VeOAjM="
      # JWT
      JwtOptions__PublicKeyPath: "Keys/public_key.pem"
      JwtOptions__TokenValidityMins: "2000"
    volumes:
      - ./backend/Flights/Keys:/app/Keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:                     
        condition: service_healthy

  mail:
    build: 
      context: ./backend       
      dockerfile: Mail/Dockerfile
    ports:
      - "8083:8080"
    volumes:
      - ./backend/Flights/Keys:/app/Keys:ro
    environment:
      # RabbitMQ
      RabbitMq__HostName: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__ExchangeName: "notifications"
      RabbitMq__Queues__Mail: "mail-service-queue"
      RabbitMq__Queues__Pdf: "pdf-generator-queue"
      RabbitMq__RoutingKeys__EmailRegistration: "email.registration"
      RabbitMq__RoutingKeys__EmailBooking: "email.booking_confirmed"
      RabbitMq__RoutingKeys__PdfGenerate: "pdf.generate_ticket"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:                      
        condition: service_healthy

  identity:
    build: 
      context: ./backend       
      dockerfile: Identity/Dockerfile
    ports:
      - "8081:8080"
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=identity;Username=postgres;Password=1234"
      JwtOptions__PublicKeyPath: "Keys/public_key.pem"
      JwtOptions__PrivateKeyPath: "Keys/private_key.pem"
      JwtOptions__TokenValidityMins: "2000"
      JwtOptions__RefreshTokenValidityMins: "2000"

      # RabbitMQ
      RabbitMq__HostName: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__ExchangeName: "notifications"
      RabbitMq__Queues__Mail: "mail-service-queue"
      RabbitMq__Queues__Pdf: "pdf-generator-queue"
      RabbitMq__RoutingKeys__EmailRegistration: "email.registration"
      RabbitMq__RoutingKeys__EmailBooking: "email.booking_confirmed"
      RabbitMq__RoutingKeys__PdfGenerate: "pdf.generate_ticket"
    volumes:
      - ./backend/Identity/Keys:/app/Keys:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command:
      - "http"
      - "http://flights:8080"
      - "--authtoken=33ThgsAijz1V5tGKN24iuEp4Phg_3YLVpxNQrhZmf7hqQzk4a"
    ports:
      - "4040:4040"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  boardingpasses:
    build:
      context: ./backend
      dockerfile: BoardingPasses/Dockerfile
    ports:
      - "8084:8080"
    environment:
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__BucketName: "boarding-passes"
      Minio__Secure: "false"
    depends_on:
      - minio

volumes:
  pgdata:
  rabbitmq_data:
  minio_data:
