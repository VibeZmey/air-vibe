<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{Subject}}</title>
  <!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
  <style>
      @media only screen and (max-width: 600px) {
          .container { width: 100% !important; max-width: 100% !important; }
          .content { padding: 24px 20px !important; }
          .mobile-full { width: 100% !important; display: block !important; }
          h1 { font-size: 24px !important; }
      }
      @media (prefers-color-scheme: dark) {
          body, .body-bg { background-color: #0F172A !important; }
          .card { background-color: #1E293B !important; }
          .text-main { color: #E2E8F0 !important; }
          .text-muted { color: #94A3B8 !important; }
          .border-subtle { border-color: #334155 !important; }
          .bg-soft { background-color: #0F172A !important; }
      }
  </style>
</head>
<body class="body-bg" style="margin:0; padding:0; background-color:#F8FAFC; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing:antialiased;">

<div style="display:none; max-height:0; overflow:hidden; color:#F8FAFC; font-size:1px;">
  {{PreviewText}}
</div>

<table width="100%" cellpadding="0" cellspacing="0" role="presentation" class="body-bg">
  <tr>
    <td align="center" style="padding: 40px 16px;">

      <table class="container card" width="600" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#FFFFFF; border-radius:20px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.08); max-width:600px; width:100%;">

        <tr>
          <td height="6" style="background: linear-gradient(90deg, #4F46E5 0%, #8B5CF6 50%, #EC4899 100%);"></td>
        </tr>

        <tr>
          <td style="padding: 32px 40px 16px; text-align:center;">
            <h1 style="margin:0; font-size:28px; font-weight:800; letter-spacing:-0.5px; color:#111827;" class="text-main">
              ✈️ <span style="color:#4F46E5;">Air</span>Vibe
            </h1>
          </td>
        </tr>

        <tr>
          <td class="content" style="padding: 24px 48px 40px; color:#374151; font-size:16px; line-height:1.6;" class="text-main">
            {{Content}}
          </td>
        </tr>

        <tr>
          <td style="background-color:#F9FAFB; padding: 24px 40px; text-align:center; border-top:1px solid #E5E7EB;" class="bg-soft border-subtle">
            <p style="margin:0 0 6px; font-size:13px; color:#6B7280;" class="text-muted">© 2026 AirVibe Inc. Все права защищены.</p>
            <p style="margin:0; font-size:12px; color:#9CA3AF;" class="text-muted">Вы получили это письмо, потому что зарегистрировались на airvibe.ru</p>
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
</body>
</html>
